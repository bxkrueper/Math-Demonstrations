"use strict";

	var worldView;
    var supportsTouch;

	function load(){
		supportsTouch = 'ontouchstart' in window || navigator.msMaxTouchPoints;
    	console.log('supportsTouch:' + supportsTouch);

		var canvas = document.getElementById("demoCanvas");
		var ctx = canvas.getContext("2d");

        _setUpCanvasContainer(canvas);

		worldView = new WorldView(ctx);
		let world = new DemoWorld();
		worldView.world = world;
	}
    function _setUpCanvasContainer(canvas){
		let dims = _getSpaceForContainer();
		canvas.width  = dims.width;
		canvas.height = dims.height;

		window.addEventListener("resize", function(){
			recalculateContainerDims();
		});
	}
	function _getSpaceForContainer(){
		let rect = document.getElementById("menuStrip").getBoundingClientRect();//absolute position
		return {width:window.innerWidth, height: window.innerHeight-(rect.bottom-rect.top)}
	}
	function recalculateContainerDims(){
		let dims = _getSpaceForContainer();
        let canvas = worldView.canvas;
		canvas.width  = dims.width;
		canvas.height = dims.height;
	}

// to call callback after the library actually finished, you need to await a promise inside an async function
//(call this)
async function loadScript(url,callback) {
	// Prevent loading the same script multiple times
	if (!document.querySelector(`script[src="${url}"]`)) {
		
		console.log('starting to load script from ' + url)

		// Halts execution inside this block until the script completely loads
    	await new Promise((resolve, reject) => {
			const script = document.createElement('script');
			script.src = url;
			script.onload = () => resolve();
			script.onerror = () => reject(new Error(`Script load error for ${url}`));
			document.head.appendChild(script);
		});

		console.log("script loaded from " + url);
	}

    // Executes safely immediately after loading finishes
	callback();
}
